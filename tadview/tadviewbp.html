    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.9rem;
    display: none;

    background: #e0e0e0;
    border-radius: 2px;
    margin-top: 12px;
    display: none;

  .progress-bar {
    height: 100%;
    background: #4a90e2;
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;

    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    background: #f0f6ff;
    border-radius: 6px;
    margin-bottom: 16px;
    display: none;

<!-- pdf-lib CDN -->
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script>
// tadviewbp.js - TAD/BPACK to PDF converter
// Ported from tadviewbp.php (tadwg/tadview) to JavaScript
// Runs in browser, uses pdf-lib from CDN

'use strict';

// ============================================================
// Utility
// ============================================================

function int_floor(val) {
  return Math.round(val - 0.2);
}

function getcodelist(stream) {
  const codelist = [];
  let lang = 0x21;
  while (stream.remain() >= 2) {
    let code = stream.uh();
    if (code === 0) continue;
    if (code < 0xfe00) {
      codelist.push((lang << 16) | code);
      continue;
    }
    if (code >= 0xff00) continue;
    lang = 0;
    while (code === 0xfefe) {
      if (stream.remain() < 2) return codelist;
      lang += 0x200;
      code = stream.uh();
    }
    if ((code & 0xff00) !== 0xfe00) lang -= 0x100;
    lang |= code & 0xff;
  }
  return codelist;
}

// ============================================================
// Stream classes
// ============================================================

class Bitstream {
  constructor() {
    this.bitremain = 0;
    this.bitbuf = 0;
    this.linkinfo = [];
    this.linkinfopos = 0;
    this.parentlinkinfo = this;
  }
  appendlinkinfo(li) { this.linkinfo.push(li); }
  getlinkinfo() {
    if (this.parentlinkinfo !== this) return this.parentlinkinfo.getlinkinfo();
    if (this.linkinfopos >= this.linkinfo.length) return null;
    return this.linkinfo[this.linkinfopos++];
  }
  rewindlinkinfo() { this.linkinfopos = 0; }
  fillbit() {
    while (this.bitremain <= 23) {
      if (!this.remain()) throw new Error('end of file.');
      this.bitbuf = (this.bitbuf | (this.ub() << (23 - this.bitremain))) & 0x7fffffff;
      this.bitremain += 8;
    }
  }
  pollbit(len = 1) {
    if (len > 31) throw new Error('bitstream::pollbit > 31');
    this.fillbit();
    return this.bitbuf >>> (31 - len);
  }
  getbit(len = 1) {
    const val = this.pollbit(len);
    this.bitbuf = (this.bitbuf << len) & 0x7fffffff;
    this.bitremain -= len;
    return val;
  }
  uhs(size) {
    const a = [];
    while (size-- > 0) a.push(this.uh());
    return a;
  }
}

class Bytestream extends Bitstream {
  constructor() {
    super();
    this.top = 0; this.end = 0; this.pos = 0;
  }
  uh() { const l = this.ub(); return (l | (this.ub() << 8)) & 0xffff; }
  uw() { const l = this.uh(); return ((l | (this.uh() << 16)) >>> 0); }
  b() { let v = this.ub(); if (v & 0x80) v -= 0x100; return v; }
  h() { let v = this.uh(); if (v & 0x8000) v -= 0x10000; return v; }
  w() { return this.uw(); }
  offset(pos = false, mode = 0) {
    if (pos !== false) {
      if (mode === 0) this.pos = this.top + pos;
      else if (mode === 1) this.pos += pos;
      else if (mode === 2) this.pos = this.end + pos;
      if (this.pos < this.top) this.pos = this.top;
      if (this.pos > this.end) this.pos = this.end;
    }
    return this.pos - this.top;
  }
  remain() { return this.end - this.pos; }
  size() { return this.end - this.top; }
}

class FileBytestream extends Bytestream {
  constructor(uint8array) {
    super();
    this.data = uint8array;
    this.end = uint8array.length;
  }
  ub() {
    if (this.remain() <= 0) return false;
    return this.data[this.pos++];
  }
  clone_stream() {
    const ns = new FileBytestream(this.data);
    ns.top = this.top; ns.end = this.end; ns.pos = this.pos;
    ns.parentlinkinfo = this.parentlinkinfo;
    return ns;
  }
  subst_stream(size) {
    const ns = new FileBytestream(this.data);
    ns.top = ns.pos = this.pos;
    ns.end = this.pos + size;
    ns.parentlinkinfo = this.parentlinkinfo;
    this.offset(size, 1);
    return ns;
  }
  getinfostr() {
    return `stream offset(${this.pos.toString(16).padStart(8,'0')}) in file top(${this.top.toString(16).padStart(8,'0')}) end(${this.end.toString(16).padStart(8,'0')})`;
  }
}

class ArrayBytestream extends Bytestream {
  constructor() {
    super();
    this.buffer = [];
    this.parent_infostr = '(none)';
  }
  append(uh_array) {
    for (const v of uh_array) this.buffer.push(v);
    this.end += uh_array.length * 2;
  }
  ub() {
    if (this.remain() <= 0) return false;
    if ((this.pos & 1) === 0) return this.buffer[this.pos++ / 2] & 0xff;
    return (this.buffer[(this.pos++ - 1) / 2] >> 8) & 0xff;
  }
  uh() {
    if (this.remain() <= 0) return false;
    if (this.pos & 1) return super.uh();
    const val = this.buffer[this.pos / 2];
    this.pos += 2;
    return val & 0xffff;
  }
  clone_stream() {
    const ns = new ArrayBytestream();
    ns.buffer = this.buffer; ns.top = this.top; ns.end = this.end; ns.pos = this.pos;
    ns.parent_infostr = this.parent_infostr;
    ns.parentlinkinfo = this.parentlinkinfo;
    return ns;
  }
  subst_stream(size) {
    const ns = new ArrayBytestream();
    ns.buffer = this.buffer;
    ns.top = ns.pos = this.pos;
    ns.end = this.pos + size;
    ns.parent_infostr = this.parent_infostr;
    ns.parentlinkinfo = this.parentlinkinfo;
    this.offset(size, 1);
    return ns;
  }
  getinfostr() {
    return `stream offset(${this.pos.toString(16).padStart(8,'0')}) in array top(${this.top.toString(16).padStart(8,'0')}) end(${this.end.toString(16).padStart(8,'0')}) from ${this.parent_infostr}`;
  }
}

class MemoryBytestream extends ArrayBytestream {
  append_from_stream(stream, size) {
    const arr = [];
    while (size > 0) { arr.push(stream.uh()); size -= 2; }
    super.append(arr);
    this.parent_infostr = stream.getinfostr ? stream.getinfostr() : '(unknown)';
  }
}

// ============================================================
// LZSS decompressor
// ============================================================

class HufTable {
  constructor(fs, maxcode = 14, sizebit = 4, opt = -1) {
    this.fs = fs;
    this.len = new Array(maxcode).fill(0);
    this.table = new Array(65536).fill(0);
    let size = fs.getbit(sizebit);
    if (size === 0) {
      const c = fs.getbit(sizebit);
      this.table.fill(c);
      return;
    }
    let code = 0;
    while (code < size) {
      let len = fs.getbit(3);
      if (len === 7) { while (fs.getbit(1)) len++; }
      this.len[code++] = len;
      if (code === opt) {
        let i = fs.getbit(2);
        while (i-- > 0) this.len[code++] = 0;
      }
    }
    while (code < maxcode) this.len[code++] = 0;
    this._maketable(maxcode);
  }
  _maketable(maxcode) {
    const count = {};
    const start = new Array(18).fill(0);
    start[1] = 0;
    for (const l of this.len) count[l] = (count[l] || 0) + 1;
    for (let i = 1; i <= 16; i++)
      start[i + 1] = start[i] + ((count[i] || 0) << (16 - i));
    for (let code = 0; code < maxcode; code++) {
      const len = this.len[code];
      if (len === 0) continue;
      let i = start[len];
      const nextstart = i + (1 << (16 - len));
      while (i < nextstart) this.table[i++] = code;
      start[len] = nextstart;
    }
  }
  get() {
    const val = this.table[this.fs.pollbit(16)];
    this.fs.getbit(this.len[val]);
    return val;
  }
}

class HufTableC extends HufTable {
  constructor(fs) {
    super(fs, 19, 5, 3);
    const len = new Array(510).fill(0);
    const sizebit = 9, maxcode = 510;
    let size = fs.getbit(sizebit);
    if (size === 0) {
      const c = fs.getbit(sizebit);
      this.table.fill(c);
      return;
    }
    let code = 0;
    while (code < size) {
      const type = this.get();
      if (type > 2) { len[code++] = type - 2; continue; }
      let count = 1;
      if (type === 1) count = fs.getbit(4) + 3;
      else if (type === 2) count = fs.getbit(9) + 20;
      while (count-- > 0) len[code++] = 0;
    }
    this.len = len;
    this._maketable(maxcode);
  }
}

class HufTableP extends HufTable {
  get() {
    const len = super.get();
    if (len <= 1) return len;
    return (1 << (len - 1)) | this.fs.getbit(len - 1);
  }
}

class LzssStream extends Bytestream {
  constructor(fs) {
    super();
    this.fs = fs;
    this.blocksize = 0;
    this.ptable = null;
    this.ctable = null;
    this.buffer = new Uint8Array(0x2000);
    this.rpos = 0;
    this.wpos = 0;
  }
  ub() {
    this.pos++;
    if (this.wpos !== this.rpos) {
      const val = this.buffer[this.rpos];
      this.rpos = (this.rpos + 1) & 0x1fff;
      return val;
    }
    if (this.blocksize <= 0) {
      this.blocksize = this.fs.getbit(16);
      this.ctable = new HufTableC(this.fs);
      this.ptable = new HufTableP(this.fs, 14, 4);
    }
    this.blocksize--;
    let val = this.ctable.get();
    if (val <= 255) {
      this.buffer[this.wpos] = val;
      this.rpos = this.wpos = (this.wpos + 1) & 0x1fff;
      return val;
    }
    let size = val - 256 + 3;
    let cpos = (this.wpos - 1 + 0x2000 - this.ptable.get()) & 0x1fff;
    while (size-- > 0) {
      this.buffer[this.wpos] = this.buffer[cpos];
      this.wpos = (this.wpos + 1) & 0x1fff;
      cpos = (cpos + 1) & 0x1fff;
    }
    val = this.buffer[this.rpos];
    this.rpos = (this.rpos + 1) & 0x1fff;
    return val;
  }
  offset(pos = false, mode = 0) {
    if (mode === 0 && pos !== false) pos -= this.pos;
    if (pos < 0) throw new Error('lzssstream::offset() backward seek not supported');
    if (pos === false) return this.pos;
    while (pos-- > 0) this.ub();
    return this.pos;
  }
  getinfostr() { return `lzssstream offset(${this.pos.toString(16)})`; }
}

// ============================================================
// BPACK header classes
// ============================================================

class BpGhead {
  constructor(fs) {
    this.headtype = fs.ub();
    this.checksum = fs.ub();
    this.version = fs.uh();
    this.crc = fs.uh();
    this.nfiles = fs.uh();
    this.compmethod = fs.uh();
    this.time = fs.uw();
    this.filesize = fs.uw();
    this.orgsize = fs.uw();
    this.compsize = fs.uw();
    this.extsize = fs.uw();
  }
  _uw2sum(val) {
    return ((val >> 24) & 0xff) + ((val >> 16) & 0xff) + ((val >> 8) & 0xff) + (val & 0xff);
  }
  calcchecksum() {
    let s = 0;
    for (const v of [this.version, this.crc, this.nfiles, this.compmethod,
      this.time, this.filesize, this.orgsize, this.compsize, this.extsize])
      s += this._uw2sum(v);
    return s & 0xff;
  }
  checkhead() {
    if (this.checksum !== this.calcchecksum()) throw new Error('bp_ghead::checksum error');
    if (this.version !== 0x100) throw new Error('bp_ghead::version error');
    if (this.compmethod !== 0 && this.compmethod !== 5) throw new Error('bp_ghead::compmethod error');
    return true;
  }
}

class BpLhead {
  constructor(fs) {
    this.ftype = fs.uh();
    this.atype = fs.uh();
    // name: 20 LE-16bit words; each word: low=l, high=h → EUC-JP: 0x8080|(h<<8)|l
    // Must always read exactly 20 words (40 bytes) to keep stream position correct
    const nameEuc = [];
    for (let i = 0; i < 20; i++) {
      const w = fs.uh();
      const l = w & 0xff;
      const h = (w >> 8) & 0xff;
      if (l === 0) continue;   // null byte: skip but keep reading
      if (h === 0) { nameEuc.push(l); }
      else { nameEuc.push(0x80 | h, 0x80 | l); }
    }
    this.name = bpackNameToString(nameEuc);
    this.orgid = fs.uh();
    this.compmethod = fs.uh();
    this.orgsize = fs.uw();
    this.compsize = fs.uw();
    fs.uhs(4); // reserved
    this.nlink = fs.uh();
    this.crc = fs.uh();
    this.fsize = fs.uw();
    this.offset = fs.uw();
    this.nrec = fs.uw();
    this.ltime = fs.uw();
    this.atime = fs.uw();
    this.mtime = fs.uw();
    this.ctime = fs.uw();
  }
}

class BpRhead {
  constructor(fs) {
    this.type = fs.uh();
    this.subtype = fs.uh();
    this.size = fs.uw();
  }
}

// ============================================================
// TAD data structures
// ============================================================

class FileInfo {
  constructor() {
    this.lh = null;
    this.name = null;
    this.mtime = 0;
    this.jumpto = null;
  }
}

class LinkInfo {
  constructor() {
    this.fileinfo = null;
    this.attr = 0;
    this.title = '';
  }
}

// ============================================================
// Scale
// ============================================================

class Scale {
  constructor() {
    this.view = [0, 0, 1, 1, 1, 1];
    this.draw = [0, 0, 1, 1, 1, 1];
  }
  setview(left = 0, top = 0, right = 1, bottom = 1) {
    this.view = [left, top, right, bottom, right - left, bottom - top];
  }
  setdraw(left = 0, top = 0, right = 1, bottom = 1) {
    this.draw = [left, top, right, bottom, right - left, bottom - top];
  }
  getview(out) { out[0]=this.view[0]; out[1]=this.view[1]; out[2]=this.view[2]; out[3]=this.view[3]; }
  getdraw(out) { out[0]=this.draw[0]; out[1]=this.draw[1]; out[2]=this.draw[2]; out[3]=this.draw[3]; }
  import_copy(scale) { this.view = [...scale.view]; this.draw = [...scale.draw]; }
  convert_point(pt) {
    pt[0] = this.view[0] + (pt[0] - this.draw[0]) * this.view[4] / this.draw[4];
    pt[1] = this.view[1] + (pt[1] - this.draw[1]) * this.view[5] / this.draw[5];
  }
  rconvert_point(pt) {
    pt[0] = this.draw[0] + (pt[0] - this.view[0]) * this.draw[4] / this.view[4];
    pt[1] = this.draw[1] + (pt[1] - this.view[1]) * this.draw[5] / this.view[5];
  }
  convert_size(sz) {
    sz[0] = sz[0] * this.view[4] / this.draw[4];
    sz[1] = sz[1] * this.view[5] / this.draw[5];
  }
  convert_length(l) { return l[0] * (this.view[4] + this.view[5]) / (this.draw[4] + this.draw[5]); }
}

// ============================================================
// Attribute lists
// ============================================================

class AttrList {
  constructor() { this.list = {}; }
  add(key, val) { this.list[key] = val; }
  get(key) { return this.list[key] !== undefined ? this.list[key] : null; }
  clearcurrentattr() {}
  importcopy(attrlist) { Object.assign(this.list, attrlist.list); }
  importshare(attrlist) { this.list = attrlist.list; }
}

class PageAttrList extends AttrList {
  constructor() {
    super();
    this.add('dpih', 120); this.add('dpiv', 120);
    this.add('dpch', 12000/254); this.add('dpcv', 12000/254);
    this.add('pageattr', 0);
    this.add('pageh', 297*120/25.4); this.add('pagev', 210*120/25.4);
    this.add('pageage', 1);
    this.add('marginl', 10*120/25.4); this.add('margint', 10*120/25.4);
    this.add('marginr', 10*120/25.4); this.add('marginb', 10*120/25.4);
    this.add('marginol', 10*120/25.4); this.add('marginot', 10*120/25.4);
    this.add('marginor', 10*120/25.4); this.add('marginob', 10*120/25.4);
    this.add('overlay', 0);
    for (let i = 0; i < 16; i++) this.add('overlay-'+i.toString(16), -1);
    this.add('pagestep', 1); this.add('pagecount', 1);
    this.add('pagenumber', 1); this.add('pagetotal', 0);
  }
  tadfactory(scope, dig = 0) {
    this.scope = scope;

function sprintf(fmt, ...args) {
  let i = 0;
  return fmt.replace(/%(\d*)([dxXs])/g, (_, w, t) => {
    const v = args[i++];
    let s;
    if (t === 'd') s = String(v >>> 0);
    else if (t === 'x') s = (v >>> 0).toString(16);
    else if (t === 'X') s = (v >>> 0).toString(16).toUpperCase();
    else s = String(v);
    if (w) s = s.padStart(parseInt(w), '0');
    return s;
  });
}

class PartsList {
  constructor() { this.list = []; this.pos = 0; }

  get() { if (this.list.length <= this.pos) return null; return this.list[this.pos++]; }
  get_last() { return this.list[this.list.length - 1]; }
  unget() { if (this.pos > 0) this.pos--; }
  remain() { return Math.max(0, this.list.length - this.pos); }
  count() { return this.list.length; }
  setpos(p) { this.pos = p; }
  truncate(size) { this.list.splice(size); }
}

    }
    let w = this.parent.textattrlist.getcharwidth(subscript === 2 ? 0 : 1);
    let h = this.parent.textattrlist.getcharheight(subscript === 1 ? 0 : 1);
    const attr = this.parent.textattrlist.getcharattr();
    genv.setfont(this.parent.textattrlist.get('fontname'), this.parent.textattrlist.get('charclass'), attr);
    let w_real = w, h_real = h;
    if (attr & 0x8000) w_real = genv.textwidth(w, h, this.code);
    pos[1] = y - h_real + 1;
    pos[3] = y + 1;
    pos[0] = x - (w_real / 2);
    pos[2] = pos[0] + w_real;
    if (draw === 0) return;
    let dx = pos[0], dy = pos[1];
    switch (subscript) {
      case 1: {
        const size = this.parent.textattrlist.getcharheight();
        if ((this.parent.textattrlist.get('subscripttype') & 1) === 0) dy += h - size;
        h = size; break;
      }
      case 2: {
        const size = this.parent.textattrlist.getcharwidth();
        if (this.parent.textattrlist.get('subscripttype') & 1) dx += w - size;
        w = size; break;
      }
    }
    const pt = [dx, dy]; this.parent.scale.convert_point(pt);
    const sz = [w, h]; this.parent.scale.convert_size(sz);
    const szr = [w_real, h_real]; this.parent.scale.convert_size(szr);
    genv.setcolor(this.parent.textattrlist.get('charcolor'));
    genv.text(int_floor(pt[0]), int_floor(pt[1]), int_floor(sz[0]), int_floor(sz[1]), this.code);
    if (this.parent.textattrlist.get('underline') >= 0) {
      genv.setlattr(1, [0xff]);
      genv.polyline(2, [pt[0], pt[1]+sz[1]-1, pt[0]+sz[0]-1, pt[1]+sz[1]-1]);
    }
  }
}

class TadFactoryControlCharParts {
  constructor(scope, dig = 0) {

    for (const k of ['0009','000a','000b','000c','000d'])
      scope.factoryfinder.add(k, target);
  }
  create(key, type, stream) {
    const map = {9:'000d0000,9', 0xa:'000d0000,12', 0xb:'000d0000,13', 0xc:'000d0000,15', 0xd:'000d0000,10'};
    const v = map[type];
    if (v) { const [k,t] = v.split(','); return this.scope.factoryfinder.read(k, parseInt(t), stream); }
    return this.scope.factoryfinder;
  }

class TadFactoryTextObjectParts {
  constructor(scope, dig = 0) {
    this.scope = scope;
    const target = dig ? scope : this;
    scope.factoryfinder.add('ffa00800', target);
    scope.factoryfinder.add('ffa40600', target);
    scope.factoryfinder.add('ffad', target);
  }
  create(key, type, stream) {
    if (key === 'ffa00800') {
      const np = new LayoutControlParts(this.scope, type);
      this.scope.partslist.add(np);
      return this.scope.factoryfinder.read('000d0000', 0xa, stream);
    }
    if (key === 'ffa40600') {
      const np = new RubiParts(this.scope, type, getcodelist(stream));
      this.scope.partslist.add(np);
      return this.scope.factoryfinder;
    }
    if (stream.remain() < 2) return this.scope.factoryfinder;
    const subtype = stream.uh();
    if (((type << 8) | (subtype >> 8)) === 0xffad00) {
      if (stream.remain() < 2) return this.scope.factoryfinder;
      const np = new VariableParts(this.scope, stream.uh());
      this.scope.partslist.add(np);
    }
    return this.scope.factoryfinder;
  }
}

class RubiParts extends Parts {
  constructor(parent, type, codelist) {
    super(parent);
    this.type = type; this.codelist = codelist;
  }
  iswordwrap() { return 2; }
  draw(genv, pos, draw = 1) {
    pos[2] = pos[0]; pos[3] = pos[1];
    if (draw === 0) return;
    const x = pos[0], y = pos[1];
    let w = this.parent.textattrlist.getcharwidth() / 2;
    let h = this.parent.textattrlist.getcharheight() / 2;
    const attr = this.parent.textattrlist.getcharattr();
    genv.setfont(this.parent.textattrlist.get('fontname'), this.parent.textattrlist.get('charclass'), attr);
    genv.setcolor(this.parent.textattrlist.get('charcolor'));
    const pt = [x, y]; this.parent.scale.convert_point(pt);
    const sz = [w, h]; this.parent.scale.convert_size(sz);
    let rx = pt[0], ry = pt[1];
    const chardir = this.parent.textattrlist.get('chardir');
    switch (chardir) {
      case 1: rx -= sz[0];
      default: case 0: if ((this.type & 1) === 0) ry -= sz[1] * 3; break;
      case 2:
        if ((this.type & 1) === 0) rx += sz[0]; else rx -= sz[0] * 2; break;
    }
    let feed = sz[0];
    for (const code of this.codelist) {
      genv.text(int_floor(rx), int_floor(ry), int_floor(sz[0]), int_floor(sz[1]), code);
      if (attr & 0x8000) feed = genv.textwidth(sz[0], sz[1], code);
      switch (chardir) {
        default: case 0: rx += feed; break;
        case 1: rx -= feed; break;
        case 2: ry += sz[1]; break;
      }
    }
  }
}

class VariableParts extends Parts {
  constructor(parent, type) { super(parent); this.type = type; }
  createchar(layout, code, lang = 0x21) {
    layout.add(new CharParts(this.parent, code, lang));
  }
  createcharascii(layout, string) {
    const s = String(string);
    for (let i = 0; i < s.length; i++) {
      const c = s.charCodeAt(i);
      if (c < 0x80) {
        // ASCII: encode as JIS X 0208 row 3 (0x2321+)
        const jis = 0x2321 + c - 0x20;
        this.createchar(layout, jis);
      }
    }
  }
  toroman(num) {
    const a = ['','I','II','III','IV','V','VI','VII','VIII','IX'];
    let s = '';
    while (num >= 1000) { s += 'm'; num -= 1000; }
    s += a[Math.floor(num/100)%10].replace(/I/g,'c').replace(/V/g,'d').replace(/X/g,'m');
    s += a[Math.floor(num/10)%10].replace(/I/g,'x').replace(/V/g,'l').replace(/X/g,'c');
    s += a[num%10].replace(/I/g,'i').replace(/V/g,'v').replace(/X/g,'x');
    return s;
  }
  reflowthis(layoutroot, cb, target) {
    if (cb.val) { target.createbranch(this, 1); cb.val = 0; }
    const now = new Date();
    switch (this.type) {
      case 0: this.createcharascii(layoutroot, this.parent.pageattrlist ? 'file' : 'file'); break;
      case 100: this.createcharascii(layoutroot, String(now.getFullYear()).slice(-2)); break;
      case 110: this.createcharascii(layoutroot, String(now.getMonth()+1)); break;
      case 111: this.createcharascii(layoutroot, String(now.getMonth()+1).padStart(2,'0')); break;
      case 120: this.createcharascii(layoutroot, String(now.getDate())); break;
      case 121: this.createcharascii(layoutroot, String(now.getDate()).padStart(2,'0')); break;
      case 200: this.createcharascii(layoutroot, this.parent.pageattrlist.get('pagenumber')); break;
      case 201: this.createcharascii(layoutroot, this.toroman(this.parent.pageattrlist.get('pagenumber'))); break;
      case 202: this.createcharascii(layoutroot, this.toroman(this.parent.pageattrlist.get('pagenumber')).toUpperCase()); break;
      case 250: this.createcharascii(layoutroot, this.parent.pageattrlist.get('pagetotal')); break;
      case 251: this.createcharascii(layoutroot, this.toroman(this.parent.pageattrlist.get('pagetotal'))); break;
      case 252: this.createcharascii(layoutroot, this.toroman(this.parent.pageattrlist.get('pagetotal')).toUpperCase()); break;
    }
  }
}

// ============================================================
// Image parts (minimal - just bounding box for PDF)
// ============================================================

class TadFactoryImageParts {
  constructor(scope, dig = 0) {
    this.scope = scope;
    const target = dig ? scope : this;
    scope.factoryfinder.add('ffe5', target);
  }
  create(key, type, stream) {
    const np = new ImageParts(this.scope);
    np.stream_infostr = stream.getinfostr ? stream.getinfostr() : '';
    np.view[0] = stream.h(); np.view[1] = stream.h();
    np.view[2] = stream.h(); np.view[3] = stream.h();
    const left0 = stream.h(), top0 = stream.h(), right0 = stream.h(), bottom0 = stream.h();
    np.scale.setdraw(left0, top0, right0, bottom0);
    stream.uh(); stream.uh(); // DPI h,v
    stream.h();               // slope
    const colorattr = stream.uh();
    const colorinfo = [stream.uh(), stream.uh(), stream.uh(), stream.uh()];

    // Build colormap
    let colormap = null;
    let shift_r, shift_g, shift_b, mask_r, mask_g, mask_b, mul_r, mul_g, mul_b;
    if (colorattr & 8) {
      // indexed color
      colormap = new Array(256).fill(0xffffff);
      for (let i = 0; i < 256; i++)
        colormap[i] = this.scope.figattrlist.get(sprintf('colormap-%04x', i)) || 0xffffff;
      const count = colorinfo[0] / 4;
      if (count > 0) {
        const saved = stream.offset();
        const cmofs = (colorinfo[2] << 16) | colorinfo[3];
        const cms = stream.clone_stream ? stream.clone_stream() : null;
        if (cms) {
          cms.offset(cmofs, 0);
          for (let i = 0; i < count; i++) colormap[i] = cms.uw() & 0xffffff;
        }
      }
    } else {
      switch (colorattr & 7) {
        case 0: // B/W
          shift_r = shift_g = shift_b = colorinfo[0] >> 8;
          mask_r = mask_g = mask_b = 0x0fffffff >>> (28 - (colorinfo[0] & 0xff));
          mul_r = mul_g = mul_b = Math.floor(255 / (mask_r || 1));
          break;
        case 1: // RGB
          shift_r = colorinfo[0] >> 8; mask_r = 0x0fffffff >>> (28-(colorinfo[0]&0xff)); mul_r = Math.floor(255/(mask_r||1));
          shift_g = colorinfo[1] >> 8; mask_g = 0x0fffffff >>> (28-(colorinfo[1]&0xff)); mul_g = Math.floor(255/(mask_g||1));
          shift_b = colorinfo[2] >> 8; mask_b = 0x0fffffff >>> (28-(colorinfo[2]&0xff)); mul_b = Math.floor(255/(mask_b||1));
          break;
        default:
          stream.uw(); stream.uw(); stream.uw(); stream.uh(); stream.uh(); stream.uh(); stream.uh();
          np.bounds[0]=stream.h();np.bounds[1]=stream.h();np.bounds[2]=stream.h();np.bounds[3]=stream.h();
          this.scope.partslist.add(np);
          return this.scope.factoryfinder;
      }
    }

    stream.uw(); // extlen
    stream.uw(); // extoff
    const maskoffset = stream.uw();
    let maskstream = null;
    if (maskoffset > 0 && stream.clone_stream) {
      maskstream = stream.clone_stream();
      maskstream.offset(maskoffset, 0);
    }

    const compac  = stream.uh();
    const planes  = stream.uh();
    const pixbits = stream.uh();
    const pixeldatawidth = Math.min(pixbits >> 8, 32);
    const pixelcount     = Math.min(pixbits & 0xff, 28);
    const pixelmask      = 0x0fffffff >>> (28 - pixelcount);
    const rowbytes = stream.uh();
    np.bounds[0] = stream.h(); np.bounds[1] = stream.h();
    np.bounds[2] = stream.h(); np.bounds[3] = stream.h();
    const width  = np.bounds[2] - np.bounds[0];
    const height = np.bounds[3] - np.bounds[1];

    // Read plane offsets and build plane streams
    const planestream = [];
    for (let i = 0; i < planes; i++) {
      const ofs = stream.uw();
      if (ofs === 0) { planestream.push(null); continue; }
      if (stream.clone_stream) {
        const ps = stream.clone_stream();
        ps.offset(ofs, 0);
        planestream.push(ps);
      } else planestream.push(null);
    }

    // Decode pixels into RGBA array
    const rgba = new Uint8ClampedArray(width * height * 4);
    let maskdata = 0xffff;

    for (let y = 0; y < height; y++) {
      // Read one row per plane
      const planedataarray = [];
      for (let i = 0; i < planes; i++) {
        const row = new Array(rowbytes).fill(0);
        if (planestream[i]) for (let j = 0; j < rowbytes; j++) row[j] = planestream[i].ub();
        planedataarray.push(row);
      }

      for (let x = 0; x < width; x++) {
        // Refresh mask word every 16 pixels
        if ((x % 16) === 0) {
          if (maskstream) {
            const mw = maskstream.uh();
            maskdata = ((mw >> 8) | ((mw << 8) & 0xff00)) & 0xffff;
            maskdata = (maskdata << 1) & 0xffff; // pre-shift
          } else {
            maskdata = 0xffff;
          }
        }

        // Check transparency (bit 15 of shifted mask)
        const transparent = !((maskdata & 0x8000) !== 0);
        maskdata = (maskdata << 1) & 0xffff;

        // Decode pixel value from planes
        let pixel = 0;
        if (pixeldatawidth > 8) {
          for (let i = planes - 1; i >= 0; i--) {
            pixel = (pixel << pixelcount) >>> 0;
            pixel |= (planedataarray[i].shift() || 0) & pixelmask;
            pixel |= ((planedataarray[i].shift() || 0) << 8) & pixelmask;
            if (pixeldatawidth > 16) {
              pixel |= ((planedataarray[i].shift() || 0) << 16) & pixelmask;
              pixel |= ((planedataarray[i].shift() || 0) << 24) & pixelmask;
            }
          }
        } else {
          for (let i = planes - 1; i >= 0; i--) {
            pixel = (pixel << pixelcount) >>> 0;
            pixel |= ((planedataarray[i][0] <<= pixeldatawidth) >> 8) & pixelmask;
            if (((x + 1) * pixeldatawidth) % 8 === 0) planedataarray[i].shift();
          }
        }

        const idx = (y * width + x) * 4;
        if (transparent) {
          rgba[idx]=255; rgba[idx+1]=255; rgba[idx+2]=255; rgba[idx+3]=0;
          continue;
        }

        let rgb;
        if (colormap !== null) {
          rgb = colormap[pixel] || 0xffffff;
        } else {
          const r = (((pixel >>> shift_r) & mask_r) * mul_r) & 0xff;
          const g = (((pixel >>> shift_g) & mask_g) * mul_g) & 0xff;
          const b = (((pixel >>> shift_b) & mask_b) * mul_b) & 0xff;
          rgb = (r << 16) | (g << 8) | b;
        }
        rgba[idx]   = (rgb >> 16) & 0xff;
        rgba[idx+1] = (rgb >> 8)  & 0xff;
        rgba[idx+2] =  rgb        & 0xff;
        rgba[idx+3] = 255;
      }
    }

    np.bitmaparray = { rgba, width, height };
    this.scope.partslist.add(np);
    return this.scope.factoryfinder;
  }
}

class TadFactoryImagePartsInText extends TadFactoryImageParts {
  create(key, type, stream) {
    const ret = super.create(key, type, stream);
    const np = this.scope.partslist.get_last();
    let right = np.view[2] - np.view[0];
    let top = np.view[1] - (np.view[3] - 1);
    const bottom = 1;
    if (right <= 0 || top >= 1) {
      const out = [0,0,0,0]; np.scale.getdraw(out);
      top = -this.scope.textattrlist.getcharheight() + 1;
      right = this.scope.textattrlist.getcharwidth() * (out[2]-out[0]) / (out[3]-out[1]);
    }
    const left = -(right / 2);
    np.view = [left, top, left + right, bottom];
    return ret;
  }
}

class ImageParts extends Parts {
  constructor(parent) {
    super(parent);
    this.scale = new Scale();
    this.view = [0,0,0,0];
    this.bounds = [0,0,0,0];
    this.bitmaparray = null; // {rgba, width, height}
  }
  async draw(genv, pos, draw = 1) {
    const x = pos[0], y = pos[1];
    pos[0] = this.view[0] + x; pos[1] = this.view[1] + y;
    pos[2] = this.view[2] + x; pos[3] = this.view[3] + y;
    if (draw === 0 || !this.bitmaparray) return;

    const ptl = [pos[0], pos[1]]; this.parent.scale.convert_point(ptl);
    const ptr = [pos[2], pos[3]]; this.parent.scale.convert_point(ptr);

    const out = [0,0,0,0]; this.scale.getdraw(out);
    const draw_rect = [
      int_floor(out[0] - this.bounds[0]),
      int_floor(out[1] - this.bounds[1]),
      int_floor(out[2] - this.bounds[0]),
      int_floor(out[3] - this.bounds[1])
    ];
    const view_rect = [
      int_floor(ptl[0]), int_floor(ptl[1]),
      int_floor(ptr[0]), int_floor(ptr[1])
    ];
    await genv.bitmap(this.bitmaparray, view_rect, draw_rect);
  }
}

class VobjParts extends Parts {
  constructor(parent) {
    super(parent);
    this.view = [0,0,0,0];
    this.height = 0; this.fontsize = 0;
    this.frcolor = 0; this.fgcolor = 0; this.bgcolor = 0xffffff;
    this.linkinfo = null;
  }
  draw(genv, pos, draw = 1) {
    const x = pos[0], y = pos[1];
    let l = pos[0] = this.view[0] + x;
    let t = pos[1] = this.view[1] + y;
    let r = pos[2] = this.view[2] + x;
    let b = pos[3] = this.view[3] + y;
    if (draw === 0) return;
    const ptl = [l, t]; this.parent.scale.convert_point(ptl);
    const ptr = [r, b]; this.parent.scale.convert_point(ptr);
    l = ptl[0]; t = ptl[1]; r = ptr[0]; b = ptr[1];
    let linewidth = 1;
    if (this.linkinfo !== null)
      linewidth = (this.linkinfo.attr & 0x80) ? 0 : 1;
    const lw = [linewidth]; const lwv = this.parent.scale.convert_length(lw);
    const points = [l,t, r-linewidth,t, r-linewidth,b-linewidth, l,b-linewidth, l,t];
    if (this.linkinfo && this.linkinfo.fileinfo)
      genv.setjumpto(l, t, r, b, this.linkinfo.fileinfo.jumpto);
    genv.setcolor(this.bgcolor);
    genv.polygon(4, points);
    if (linewidth > 0) {
      genv.setcolor(this.frcolor);
      genv.setlattr(linewidth, [0xff]);
      genv.polyline(5, points);
    }
    // Draw vobj title (BPACK file name as label)
    const vobjTitle = (this.linkinfo && this.linkinfo.fileinfo && this.linkinfo.fileinfo.name)
      ? this.linkinfo.fileinfo.name : null;
    if (vobjTitle && vobjTitle.length > 0 && genv.text_unicode) {
      const fs = (this.fontsize > 0 ? this.fontsize : 10);
      genv.setcolor(this.fgcolor);
      // Pass TAD-space coords; text_unicode handles ratio conversion and clipping
      const ptl2 = [this.view[0] + x, this.view[1] + y];
      const ptr2 = [this.view[2] + x, this.view[3] + y];
      this.parent.scale.convert_point(ptl2);
      this.parent.scale.convert_point(ptr2);
      genv.text_unicode(vobjTitle, ptl2[0], ptl2[1], ptr2[0], ptr2[1], fs);
    }
  }
}

// ============================================================
// Figure parts
// ============================================================

class TadFactoryFigParts {
  constructor(scope) {
    this.scope = scope;
    this.cx = 0; this.cy = 0; this.rh = 0; this.rv = 0;
    scope.factoryfinder.add('ffb0', this);
  }
  readradian(stream) {
    const x = (stream.h() - this.cx) * this.rv;
    const y = (stream.h() - this.cy) * this.rh;
    if (y < x) {
      if (y < -x) { if (y >= -2) return 0; return -Math.atan(x/y) + Math.PI*1.5; }
      if (x <= 2) return 0;
      if (y < 0) return Math.atan(y/x) + Math.PI*2;
      return Math.atan(y/x);
    }
    if (y < -x) { if (x >= -2) return 0; return Math.atan(y/x) + Math.PI; }
    if (y <= 2) return 0;
    return -Math.atan(x/y) + Math.PI/2;
  }
  createarrow(sx, sy, ex, ey, fgpatid, linewidth) {
    if (linewidth <= 0 || fgpatid <= 0) return;
    const vx = ex-sx, vy = ey-sy;
    const length = Math.sqrt(vx*vx+vy*vy) / (4.0+linewidth*3);
    if (length <= 0.5) return;
    const sin = Math.sin(24*Math.PI/180)/length;
    const cos = Math.cos(24*Math.PI/180)/length;
    const np = new LineParts(this.scope);
    np.setfgpat(fgpatid, linewidth);
    np.addpoint(vx*cos-vy*sin+sx, vx*sin+vy*cos+sy);
    np.addpoint(sx, sy);
    np.addpoint(vx*cos+vy*sin+sx, -vx*sin+vy*cos+sy);
    this.scope.partslist.add(np);
  }
  setup_oval(l,t,r,b) { this.cx=(l+r)/2; this.cy=(t+b)/2; this.rh=(r-l)/2; this.rv=(b-t)/2; }
  addpoint_onoval(parts, rad) {
    parts.addpoint(this.cx+Math.cos(rad)*this.rh, this.cy+Math.sin(rad)*this.rv);
  }
  addvector_onoval(parts, s, e) {
    const x = this.cx+Math.cos(s)*this.rh, y = this.cy+Math.sin(s)*this.rv;
    const sin = Math.sin((e-s)/2), cos2 = Math.cos((e-s)/2);
    const mul = (1-cos2)/sin*4/3;
    parts.addpoint(x+Math.cos(s+Math.PI/2)*this.rh*mul, y+Math.sin(s+Math.PI/2)*this.rv*mul);
  }
  _read_line_common(stream) {
    const linetype = stream.uh(), linewidth = linetype & 0xff;
    const fgpatid = stream.uh();
    return {linetype, linewidth, fgpatid};
  }
  create_rect(subtype, stream) {
    const np = new LineParts(this.scope);
    if (stream.remain() < 16) return;
    const {linetype, linewidth, fgpatid} = this._read_line_common(stream);
    const bgpatid = stream.uh(), angle = stream.h();
    let l = stream.h(), t = stream.h(), r = stream.h(), b = stream.h();
    let lw = Math.min(linewidth, r-l, b-t);
    if (lw > 0 && fgpatid > 0) np.setfgpat(fgpatid, lw, linetype>>8);
    if (bgpatid > 0) np.setbgpat(bgpatid);

class LineParts extends Parts {
  constructor(parent) {
    super(parent);
    this.fgpat = null; this.bgpat = null;
    this.pointlist = [];
    this.linewidth = 0; this.linepattern = [0];
  }
  addpoint(x, y) { this.pointlist.push(x, y); }
  setfgpat(fgpatid, linewidth = 1, linetype = 0) {
    this.fgpat = this.parent.figattrlist.get(sprintf('pattern-%04x', fgpatid));
    this.linewidth = linewidth;
    this.linepattern = this.parent.figattrlist.get(sprintf('linetype-%04x', linetype));
  }
  setbgpat(bgpatid) {
    this.bgpat = this.parent.figattrlist.get(sprintf('pattern-%04x', bgpatid));
  }
  draw(genv, pos, draw = 1) {
    const x = pos[0], y = pos[1];
    if (this.pointlist.length < 2) { pos[2]=x; pos[3]=y; return; }
    let left=this.pointlist[0],right=this.pointlist[0],top=this.pointlist[1],bottom=this.pointlist[1];
    for (let i = 2; i < this.pointlist.length; i += 2) {
      left=Math.min(left,this.pointlist[i]); right=Math.max(right,this.pointlist[i]);
      top=Math.min(top,this.pointlist[i+1]); bottom=Math.max(bottom,this.pointlist[i+1]);
    }
    pos[0]=left+x; pos[1]=top+y; pos[2]=right+this.linewidth+x; pos[3]=bottom+this.linewidth+y;
    if (draw === 0) return;
    const pl = [];
    const count = this.pointlist.length / 2;
    for (let i = 0; i < this.pointlist.length; i += 2) {
      const pt = [this.pointlist[i]+x, this.pointlist[i+1]+y];
      this.parent.scale.convert_point(pt);
      pl.push(pt[0], pt[1]);
    }
    if (this.bgpat !== null) {
      genv.setpattern(this.bgpat);
      genv.polygon(count-1, pl);
    }
    if (this.fgpat !== null && this.linewidth > 0) {
      genv.setpattern(this.fgpat);
      genv.setlattr(this.linewidth, this.linepattern);
      genv.polyline(count, pl);
    }
  }
}

class LayoutPageset extends Layout {
  constructor(lr, parent, layout, limit) {
    super(lr, parent, layout, limit);
    this.layoutname = 'layout_pageset';
    this.pagesizelist = [];
  }
  createbranch(parts, force = 0) {
    if (!force && parts.parent.textattrlist.get('escapeflag') < 0xf
        && this.forwarding !== null) {
      this.forwarding.createbranch(parts, force); return;
    }
    if (this.forwarding) this.fixchild();
    const ps = [
      parts.parent.pageattrlist.get('pageh'),
      parts.parent.pageattrlist.get('pagev'),
      parts.parent.pageattrlist.get('marginl'),
      parts.parent.pageattrlist.get('margint'),
      parts.parent.pageattrlist.get('marginr'),
      parts.parent.pageattrlist.get('marginb')

    const layout = [0, 0, ps[0]-ps[2]-ps[4], ps[1]-ps[3]-ps[5]];
    const offset = [ps[2], ps[3]];
    const newlayout = [0,0,0,0], newlimit = [0,0];
    switch (parts.parent.textattrlist.get('chardir')) {
      case 1: newlayout[0]=-layout[2]; newlimit[1]=layout[3]; offset[0]+=layout[2]; break;
      case 2: newlayout[3]=layout[3]; newlimit[0]=-layout[2]; offset[0]+=layout[2]; break;
      default: case 0: newlayout[2]=layout[2]; newlimit[1]=layout[3]; break;
    }
    this.offsetlist.push(offset);
    this.forwarding = new LayoutLineset(this.parent, this, newlayout, newlimit);
    this.forwarding.createbranch(parts, force);
  }
  add(obj, force = 0) {
    this.partslist.add(obj);
    obj.setpartsinfo(this);
  }
  draw(genv, pos, draw = 1) {
    const x = pos[0], y = pos[1];
    this.partslist.rewind();
    let idx = 0, pageage = -1;
    while (this.partslist.remain() > 0) {
      const target = this.partslist.get();
      const ps = this.pagesizelist[idx];
      const cp = target.currentparts;
      if (cp && pageage !== cp.parent.pageattrlist.get('pageage')) {
        pageage = cp.parent.pageattrlist.get('pageage');
        genv.setpagenumber(cp.parent.pageattrlist.get('pagenumber'), cp.parent.pageattrlist.get('pagestep'));
      }
      genv.setoverlay(cp ? cp.parent.pageattrlist : null);
      if (genv.newpage(ps[0],ps[1],ps[2],ps[3],ps[4],ps[5]) === null) break;
      const offset = this.offsetlist[idx];
      const lpos = [offset[0]+x, offset[1]+y, 0, 0];
      target.draw(genv, lpos, draw);
      idx++;

class LayoutLineset extends Layout {
  constructor(lr, parent, layout, limit) {
    super(lr, parent, layout, limit);
    this.layoutname = 'layout_lineset';
    this.first = 1;
    this.padposlist = [];
  }
  createbranch(parts, force = 0) {
    if (!force && parts.parent.textattrlist.get('escapeflag') < 0xa
        && this.forwarding !== null) {
      this.forwarding.createbranch(parts, force); return;
    }
    if (this.forwarding) {
      this.fixchild();
      if (JSON.stringify(this.layout) === JSON.stringify(this.layout_org)) {
        this.parent.createbranch(parts, 1); return;
      }
    }
    const newlimit = [0,0];
    if (this.limit[0] !== 0) {
      if (this.layout[3] > 0) newlimit[1] = this.layout[3];
      else if (this.layout[1] < 0) newlimit[1] = this.layout[1];
    } else if (this.limit[1] !== 0) {
      if (this.layout[2] > 0) newlimit[0] = this.layout[2];
      else if (this.layout[0] < 0) newlimit[0] = this.layout[0];
    }
    this.forwarding = new LayoutLineblock(this.layoutroot, this, [0,0,0,0], newlimit);
    this.forwarding.createbranch(parts, force);
  }
  fixlayout() {
    super.fixlayout();
    const count = this.padposlist.length;
    if (count > 0) {
      let shiftx = 0, shifty = 0;
      if (this.limit[0] > 0) {
        shiftx = Math.max(0, this.limit[0]-this.layout[2]); if (shiftx <= 0) return;
        this.layout[2] = this.limit[0];
      } else if (this.limit[0] < 0) {
        shiftx = Math.min(0, this.limit[0]-this.layout[0]); if (shiftx >= 0) return;
        this.layout[0] = this.limit[0];
      } else if (this.limit[1] > 0) {
        shifty = Math.max(0, this.limit[1]-this.layout[3]); if (shifty < 0) return;
        this.layout[3] = this.limit[1];
      } else if (this.limit[1] < 0) {
        shifty = Math.min(0, this.limit[1]-this.layout[1]); if (shifty >= 0) return;
        this.layout[1] = this.limit[1];
      }
      let pos = 0;
      for (let i = 0; i < this.offsetlist.length; i++) {
        while (pos < this.padposlist.length && i >= this.padposlist[pos]) pos++;
        this.offsetlist[i][0] += shiftx * pos / count;
        this.offsetlist[i][1] += shifty * pos / count;
      }
    }
  }
  feed_pre(layout, obj) {
    if (this.currentparts !== null && JSON.stringify(this.layout) !== JSON.stringify(this.layout_org))
      this.currentparts.parent.textattrlist.feedline(layout, this.limit, obj.getcharwidth(), obj.getcharheight());
    return layout;
  }
  add(obj, force = 0) {
    if (this.first) { this.first = 0; force = 1; }
    super.add(obj, force);
  }
  addtobottom(obj, force = 0) {
    if (obj.layoutcontrol === 0xffa008) { this.padposlist.push(this.offsetlist.length); return; }
    super.addtobottom(obj, force);
  }
}

class LayoutLineblock extends Layout {
  constructor(lr, parent, layout, limit) {
    super(lr, parent, layout, limit);
    this.layoutname = 'layout_lineblock';
    this.first = 1;
    this.lastwordwrap = 0;
    this.reflowpos = -1;
    this.lastlayout = [...layout];
  }
  createbranch(parts, force = 0) {}
  fixlayout() {
    super.fixlayout();
    if (JSON.stringify(this.layout) !== JSON.stringify(this.layout_org)) {
      const align = this.currentparts ? this.currentparts.parent.textattrlist.get('linealign') : 0;
      let shiftx = 0, shifty = 0, remain = 0;
      if (this.limit[0] > 0) {
        remain = Math.max(0, this.limit[0]-this.layout[2]); if (remain <= 0) return;
        if (align===1) shiftx=remain/2; else if(align===2) shiftx=remain;
        this.layout[2]=this.limit[0];
      } else if (this.limit[0] < 0) {
        remain = Math.min(0, this.limit[0]-this.layout[0]); if (remain >= 0) return;
        if (align===1) shiftx=remain/2; else if(align===2) shiftx=remain;
        this.layout[0]=this.limit[0];
      } else if (this.limit[1] > 0) {
        remain = Math.max(0, this.limit[1]-this.layout[3]); if (remain <= 0) return;
        if (align===1) shifty=remain/2; else if(align===2) shifty=remain;
        this.layout[3]=this.limit[1];
      } else if (this.limit[1] < 0) {
        remain = Math.min(0, this.limit[1]-this.layout[1]); if (remain >= 0) return;
        if (align===1) shifty=remain/2; else if(align===2) shifty=remain;
        this.layout[1]=this.limit[1];
      }
      for (const off of this.offsetlist) { off[0]+=shiftx; off[1]+=shifty; }
      return;
    }
    // empty line
    if (this.limit[0] !== 0) {
      this.layout[1] = 1-this.getcharheight(); this.layout[3] = 1;
    } else if (this.limit[1] !== 0) {
      const w = this.getcharwidth();
      this.layout[0] = -w/2; this.layout[2] = w-(w/2);
    }
  }
  feed_post(layout, obj) {
    if (this.currentparts !== null)
      this.currentparts.parent.textattrlist.feedchar(layout, this.limit);
    return layout;
  }
  add(obj, force = 0) {
    if (this.first) { this.first = 0; force = 1; }
    const wordwrap = obj.iswordwrap();
    if (wordwrap !== -2) {
      if (this.lastwordwrap < 0) this.reflowpos = this.partslist.count();
      else if (wordwrap < 0) this.reflowpos = this.partslist.count();
      else if (!(this.lastwordwrap & 2) && !(wordwrap & 1)) this.reflowpos = this.partslist.count();
      this.lastwordwrap = wordwrap;
      this.lastlayout = [...this.layout];
    }
    super.add(obj, force);
  }
  cantadd(obj) {
    const work = {val:1};
    const list = [];
    if (this.reflowpos > 0) {
      this.partslist.setpos(this.reflowpos);
      while (this.partslist.remain() > 0) list.push(this.partslist.get());
      this.partslist.rewind();
      this.partslist.truncate(this.reflowpos);
    }
    list.push(obj);
    for (const o of list) o.reflowthis(this.layoutroot, work, this.parent);
    this.layout = [...this.lastlayout];
  }
  getcharwidth() {
    const v = super.getcharwidth();
    if (v > 0) return v;
    return this.currentparts ? this.currentparts.parent.textattrlist.getcharwidth() : 0;
  }
  getcharheight() {
    const v = super.getcharheight();
    if (v > 0) return v;
    return this.currentparts ? this.currentparts.parent.textattrlist.getcharheight() : 0;
  }
}

    stream.h();stream.h();stream.h();stream.h();
    stream.h();stream.h();stream.h();stream.h();
    ns.pageattrlist.set_dpi_h(stream.h());
    ns.pageattrlist.set_dpi_v(stream.h());
    ns.textattrlist.add('lang', stream.uh());
    stream.h();
    ns.partslist = this.scope.partslist;
    return ns.factoryfinder;
  }
}

class TextScopeParts extends ScopeParts {

class TadFactoryFigScopeParts {
  constructor(scope, dig = 0) {
    this.scope = scope;
    const target = dig ? scope : this;
    scope.factoryfinder.add('ffe3', target);

  create(key, type, stream) {
    if (type === 0xffe4) { this.scope.figattrlist.cleartempattr(); return this.scope.factoryfinder; }
    if (stream.remain() < 24) return this.scope.factoryfinder;
    let ns;
    if (type === -1) {
      ns = new BaseFigScopeParts(this.scope);
      ns.pagesize_mode = g_figurepage;
      ns.pageattrlist.tadfactory(ns);
    } else {
      ns = new FigScopeParts(this.scope);
    }
    ns.stream_infostr = stream.getinfostr ? stream.getinfostr() : '';
    ns.factoryfinder.add('ffe4', this);
    ns.view[0]=stream.h();ns.view[1]=stream.h();ns.view[2]=stream.h();ns.view[3]=stream.h();
    const l=stream.h(),t=stream.h(),r=stream.h(),b=stream.h();
    ns.scale.setdraw(l,t,r,b);
    ns.pageattrlist.set_dpi_h(stream.h());
    ns.pageattrlist.set_dpi_v(stream.h());
    this.scope.partslist.add(ns);
    return ns.factoryfinder;
  }
}

class TadFactoryBaseFigScopeParts extends TadFactoryFigScopeParts {
  create(key, type, stream) {

}

class TadFactoryFigScopeParts_InText extends TadFactoryFigScopeParts {
  create(key, type, stream) {
    const ret = super.create(key, type, stream);
    if (type !== 0xffe3) return ret;
    const np = this.scope.partslist.get_last();
    let right = np.view[2]-np.view[0], top = np.view[1]-(np.view[3]-1), bottom = 1;
    if (right <= 0 || top >= 1) {
      const out=[0,0,0,0]; np.scale.getdraw(out);
      top = int_floor(-this.scope.textattrlist.getcharheight()+1);
      right = int_floor(this.scope.textattrlist.getcharwidth()*(out[2]-out[0])/(out[3]-out[1]));
    }
    const left = -int_floor(right/2);
    np.view = [left, top, left+right, bottom];
    return ret;
  }
}

  constructor(parent) {

  draw(genv, pos, draw = 1) {

    let r=pos[2]=this.view[2]+x, b=pos[3]=this.view[3]+y;
    if (draw === 0) return;
    const ptl=[l,t]; this.parent.scale.convert_point(ptl);
    const ptr=[r,b]; this.parent.scale.convert_point(ptr);
    this.scale.setview(ptl[0],ptl[1],ptr[0],ptr[1]);
    this.partslist.rewind();
    while (this.partslist.remain() > 0) {

class BaseFigScopeParts extends FigScopeParts {
  constructor(parent) { super(parent); this.pagesize_mode = -1; }
 async draw(genv, pos, draw = 1) {
    // Pre-draw pass (skipped, we do single pass)
    let l,t,r,b,width,height;
    switch (this.pagesize_mode) {
      case 0: {
        const out=[0,0,0,0]; this.scale.getdraw(out);
        this.view=[0,0,out[2]-out[0],out[3]-out[1]];
        width=out[2]-out[0]; height=out[3]-out[1]; l=t=r=b=0; break;
      }
      case 1: {
        // measure all parts
        let ml=0,mt=0,mr=0,mb=0;
        this.partslist.rewind();
        while (this.partslist.remain()>0) {
          const target=this.partslist.get(); const lpos=[0,0,0,0];
          await target.draw(new GenvNull(), lpos, 0);
          ml=Math.min(ml,lpos[0]);mt=Math.min(mt,lpos[1]);
          mr=Math.max(mr,lpos[2]);mb=Math.max(mb,lpos[3]);
        }
        this.view=[0,0,mr-ml,mb-mt];
        this.scale.setdraw(ml,mt,mr,mb);
        width=mr-ml; height=mb-mt; l=t=r=b=0; break;
      }
      default: case 2: {
        l=this.pageattrlist.get('marginl'); t=this.pageattrlist.get('margint');
        r=this.pageattrlist.get('marginr'); b=this.pageattrlist.get('marginb');
        width=this.pageattrlist.get('pageh'); height=this.pageattrlist.get('pagev');
        this.view=[l,t,width-r,height-b];
        this.scale.setdraw(0,0,width-l-r,height-t-b);
        genv.setoverlay(this.pageattrlist);
        genv.setpagenumber(this.pageattrlist.get('pagenumber'), this.pageattrlist.get('pagestep'));
        break;
      }
    }
    this.scale.setview(this.view[0],this.view[1],this.view[2],this.view[3]);
    genv.newpage(width, height, l, t, r, b);
    this.partslist.rewind();
    while (this.partslist.remain() > 0) {
      const target = this.partslist.get();
      const lpos = [0,0,0,0];
      target.draw(genv, lpos, 1);
    }
    pos[0]=this.view[0]; pos[1]=this.view[1]; pos[2]=this.view[2]; pos[3]=this.view[3];
  }
}

class TadFactoryGroupFigScopeParts {
  constructor(scope) {
    this.scope = scope;
    scope.factoryfinder.add('ffb2', this);
  }
  create(key, type, stream) {
    if (type === 0) { this.scope.figattrlist.cleartempattr(); return this.scope.factoryfinder; }
    if (stream.remain() < 2) return this.scope.factoryfinder;
    const subtype = stream.uh();
    if ((subtype & 0xff00) === 0) {
      const ns = new GroupFigScopeParts(this.scope);
      ns.factoryfinder.add('ffb20100', this);
      ns.partslist = this.scope.partslist;
      return ns.factoryfinder;
    }
    if ((subtype & 0xff00) === 0x0100)
      return this.scope.factoryfinder.read('ffb20100', 0, stream);
    return this.scope.factoryfinder;
  }
}

// ============================================================
// Factory finder
// ============================================================

class FactoryFinder {
  constructor() { this.keytable = {}; }
  add(key, factory) { this.keytable[key] = factory; }
  isexist(key) { return this.keytable[key] !== undefined; }
  importcopy(ff) { Object.assign(this.keytable, ff.keytable); }
  read(key, type, stream) {
    if (!this.keytable[key]) return this;
    return this.keytable[key].create(key, type, stream) || this;
  }
}

class TadFactoryFinder extends FactoryFinder {
  readall(stream) {
    let currentff = this;
    while (stream.remain() > 0) {
      let type = stream.uh();
      let key, len = 0, substream = null;
      if (type < 0x0021) {
        key = sprintf('%04x', type);
      } else if (type < 0x2121) {
        key = '0021';
      } else if (type < 0xfe00) {
        key = '2121';
      } else if (type < 0xff00) {
        key = 'fe21';
        while (type === 0xfefe) { len += 2; type = stream.uh(); }
        if (type < 0x100) len--;
        type = (type & 0xff) | (len << 8);
        len = 0;
      } else if (type < 0xff80) {
        key = 'ff00';
      } else {
        key = sprintf('%04x', type);
        len = stream.uh();
        if (len === 0xffff) len = stream.uw();
        substream = stream.subst_stream(len);
      }
      currentff = currentff.read(key, type, substream || stream) || currentff;
    }
  }
}

// ============================================================
// Font mapping (tcmap_nodatabase equivalent)
// ============================================================

class TcmapNodatabase {
  findfont(tc, type = 0, attr = 0, charclass = 0x60c6) {
    const s = (tc >> 16) & 0xffff;
    const h = (tc >> 8) & 0xff;
    const l = tc & 0xff;
    if (s !== 0x21) return null;
    if (h < 0x21 || h > 0x7e) return null;
    if (l < 0x21 || l > 0x7e) return null;
    // EUC-JP to Unicode: row/col in JIS X 0208
    const row = h - 0x21, col = l - 0x21;
    const result = {};
    result.euccode = ((h | 0x80) << 8) | (l | 0x80);
    result.fonttype = -2;
    result.vertical = !!(attr & 0x4000);
    return result;
  }
}
