// ============================================================
// Genv PDF (using pdf-lib)
// ============================================================

class GenvPdf {
  constructor(pdfLib) {
    this.PDFLib = pdfLib;
    this.pdfDoc = null;
    this.currentPage = null;
    this.width = 0; this.height = 0;
    this.ratio_h = 0.212; this.ratio_v = 0.212;
    this.fontattr = 0; this.fontclass = 0x60c6;
    this.linewidth = 1;
    this.currentColor = [0, 0, 0];
    this.pagenumber = 1; this.pagestep = 1;
    this.overlay = null;
    this.pagecountobj = new PageCount();
    this.pageinfo = null;
    this.jumptolist = [];
    this.pendinglinks = []; // [{page, l, t, r, b, targetpage}]
    this.pageObjects = []; // store page refs for links
    this.totalPages = 0;
    this.dashPattern = null;
  }

  async init() {
    this.pdfDoc = await this.PDFLib.PDFDocument.create();
    // Register CID fonts (HeiseiMin-W3 and HeiseiKakuGo-W5)
    // These are standard Japanese PDF fonts supported by Adobe Reader
    this._cidFontH = this._registerCIDFont('HeiseiMin-W3',    'UniJIS-UCS2-H');
    this._cidFontV = this._registerCIDFont('HeiseiMin-W3',    'UniJIS-UCS2-V');
    this._cidFontGoH = this._registerCIDFont('HeiseiKakuGo-W5','UniJIS-UCS2-H');
    this._cidFontGoV = this._registerCIDFont('HeiseiKakuGo-W5','UniJIS-UCS2-V');
    return this;
  }

  _registerCIDFont(fontName, cmap) {
    // Build a minimal CIDFont dictionary for a standard Japanese font
    // This tells PDF viewers to use the system/installed font
    const ctx = this.pdfDoc.context;

    const descriptor = ctx.obj({
      Type:        'FontDescriptor',
      FontName:    fontName,
      Flags:       6,       // Symbolic | Serif
      FontBBox:    [-123, -257, 1026, 998],
      ItalicAngle: 0,
      Ascent:      998,
      Descent:     -257,
      CapHeight:   769,
      StemV:       80,
    });
    const descriptorRef = ctx.register(descriptor);

    const cidFont = ctx.obj({
      Type:           'Font',
      Subtype:        'CIDFontType0',
      BaseFont:       fontName,
      CIDSystemInfo: { Registry: 'Adobe', Ordering: 'Japan1', Supplement: 6 },
      FontDescriptor: descriptorRef,
      DW:             1000,
    });
    const cidFontRef = ctx.register(cidFont);

    const font = ctx.obj({
      Type:            'Font',
      Subtype:         'Type0',
      BaseFont:        fontName,
      Encoding:        cmap,
      DescendantFonts: [cidFontRef],
    });
    const fontRef = ctx.register(font);

    // Register in page resources
    if (!this._fontRefs) this._fontRefs = {};
    const fontKey = fontName.replace(/[^A-Za-z0-9]/g,'') + cmap.replace(/[^A-Za-z0-9]/g,'');
    this._fontRefs[fontKey] = fontRef;
    return { fontRef, fontKey, fontName, cmap };
  }

  _ensurePageFont(info) {
    if (!this.currentPage) return;
    const res = this.currentPage.node.get(this.PDFLib.PDFName.of('Resources'));
    if (!res) return;
    let fonts = res.get(this.PDFLib.PDFName.of('Font'));
    if (!fonts) {
      fonts = this.pdfDoc.context.obj({});
      res.set(this.PDFLib.PDFName.of('Font'), fonts);
    }
    const k = this.PDFLib.PDFName.of(info.fontKey);
    if (!fonts.get(k)) fonts.set(k, info.fontRef);
  }

  setdpi(dpi_h, dpi_v) {
    this.ratio_h = 72.0 / dpi_h;
    this.ratio_v = 72.0 / dpi_v;
  }

  setpagenumber(pagenumber = 1, pagestep = 1) {
    this.pagenumber = pagenumber;
    this.pagestep = pagestep;
    this.pagecountobj = this.pagecountobj.getnext();
  }

  setoverlay(pageattrlist) {
    this.overlay = pageattrlist;
    if (pageattrlist) pageattrlist.drawoverlay(this, 1, this.pagenumber, this.pagenumber);
  }

  newpage(width, height, margin_l=0, margin_t=0, margin_r=0, margin_b=0) {
    if (width === 0 && height === 0) return null;
    this.flushpage();
    this.pageinfo = [width, height, margin_l, margin_t, margin_r, margin_b];
    this.width = width;
    this.height = height;
    const pw = width * this.ratio_h;
    const ph = height * this.ratio_v;
    this.currentPage = this.pdfDoc.addPage([pw, ph]);
    this.pageObjects.push(this.currentPage);
    this.totalPages++;
    this.jumptolist = [];
    this.currentPage.pushOperators(
      this.PDFLib.pushGraphicsState()
    );
    return this;
  }

  flushpage() {
    if (!this.currentPage) return;
    // Apply pending jump links for this page
    for (const jmp of this.jumptolist) {
      // Links resolved after all pages created
      this.pendinglinks.push({
        sourcePage: this.currentPage,
        l: jmp[0], t: jmp[1], r: jmp[2], b: jmp[3],
        targetPageIdx: jmp[4]
      });
    }
    this.currentPage.pushOperators(this.PDFLib.popGraphicsState());
    this.currentPage = null;
  }

  close() {
    this.flushpage();
    // Resolve links
    for (const lnk of this.pendinglinks) {
      const tidx = lnk.targetPageIdx - 1;
      if (tidx < 0 || tidx >= this.pageObjects.length) continue;
      const targetPage = this.pageObjects[tidx];
      const pw = lnk.sourcePage.getWidth();
      const ph = lnk.sourcePage.getHeight();
      const l = lnk.l * this.ratio_h;
      const r = lnk.r * this.ratio_h;
      const t = ph - lnk.t * this.ratio_v;
      const b = ph - lnk.b * this.ratio_v;
      lnk.sourcePage.node.set(
        this.PDFLib.PDFName.of('Annots'),
        this.pdfDoc.context.obj([])
      );
      // Use annotation
      try {
        const dest = this.PDFLib.PDFArray.withContext(this.pdfDoc.context);
        dest.push(targetPage.ref);
        dest.push(this.PDFLib.PDFName.of('Fit'));
        const annot = this.pdfDoc.context.obj({
          Type: 'Annot', Subtype: 'Link',
          Rect: [Math.min(l,r), Math.min(t,b), Math.max(l,r), Math.max(t,b)],
          Border: [0,0,0],
          Dest: dest
        });
        const annotRef = this.pdfDoc.context.register(annot);
        const annots = lnk.sourcePage.node.get(this.PDFLib.PDFName.of('Annots'));
        if (annots) annots.push(annotRef);
        else lnk.sourcePage.node.set(this.PDFLib.PDFName.of('Annots'), this.pdfDoc.context.obj([annotRef]));
      } catch(e) { /* link failed, skip */ }
    }
  }

  async getBytes() {
    return await this.pdfDoc.save();
  }

  // Color
  setcolor(rgb) {
    this.currentColor = [
      ((rgb >> 16) & 0xff) / 255,
      ((rgb >> 8) & 0xff) / 255,
      (rgb & 0xff) / 255
    ];
  }

  setpattern(array) {
    // Average color of pattern
    let r=0,g=0,b=0,count=0;
    for (const row of array) for (const c of row) {
      if (c < 0) continue;
      r+=( c>>16)&0xff; g+=(c>>8)&0xff; b+=c&0xff; count++;
    }
    if (count > 0) this.setcolor(((Math.round(r/count))<<16)|((Math.round(g/count))<<8)|Math.round(b/count));
    else this.setcolor(0xffffff);
  }

  setlattr(width, pattern) {
    this.linewidth = width;
    // Build dash pattern
    let pos = 0;
    const arr = [0, 0];
    for (let i = 0; i < pattern.length * 8; i++) {
      const bit = (pattern[i >> 3] & (0x80 >> (i % 8))) ? 1 : 0;
      if ((pos & 1) === bit) arr[++pos] = 0;
      arr[pos] += width;
    }
    if (pos <= 1) {
      const mark = arr[0], space = arr[1];
      this.dashPattern = (mark === 0 || space === 0) ? null : [mark, space];
    } else {
      this.dashPattern = arr.slice(0, pos+1);
    }
  }

  _pdfY(y) { return this.height * this.ratio_v - y * this.ratio_v; }

  _colorStr(mode) {
    const r = this.currentColor[0];
    const g = this.currentColor[1];
    const b = this.currentColor[2];
    const op = mode === 'stroke' ? 'RG' : 'rg';
    return `${r.toFixed(4)} ${g.toFixed(4)} ${b.toFixed(4)} ${op}`;
  }

  _beginStroke() {
    if (!this.currentPage) return;
    const lw = (this.linewidth * this.ratio_h).toFixed(4);
    let dashStr = '[] 0 d';
    if (this.dashPattern && this.dashPattern.length > 0) {
      const arr = this.dashPattern.map(v => v.toFixed(2)).join(' ');
      dashStr = `[${arr}] 0 d`;
    }
    this.currentPage.pushOperators(
      this.PDFLib.PDFOperator.of(this._colorStr('stroke')),
      this.PDFLib.PDFOperator.of(`${lw} w`),
      this.PDFLib.PDFOperator.of(dashStr)
    );
  }

  _beginFill() {
    if (!this.currentPage) return;
    this.currentPage.pushOperators(
      this.PDFLib.PDFOperator.of(this._colorStr('fill'))
    );
  }

  polyline(count, array) {
    if (!this.currentPage || count < 2) return;
    this._beginStroke();
    const ops = [];
    for (let i = 0; i < count * 2; i += 2) {
      const x = array[i] * this.ratio_h;
      const y = this._pdfY(array[i+1]);
      if (i === 0) ops.push(this.PDFLib.moveTo(x, y));
      else ops.push(this.PDFLib.lineTo(x, y));
    }
    ops.push(this.PDFLib.stroke());
    this.currentPage.pushOperators(...ops);
  }

  polygon(count, array) {
    if (!this.currentPage || count < 2) return;
    this._beginFill();
    const ops = [];
    for (let i = 0; i < count * 2; i += 2) {
      const x = array[i] * this.ratio_h;
      const y = this._pdfY(array[i+1]);
      if (i === 0) ops.push(this.PDFLib.moveTo(x, y));
      else ops.push(this.PDFLib.lineTo(x, y));
    }
    ops.push(this.PDFLib.closePath(), this.PDFLib.fill());
    this.currentPage.pushOperators(...ops);
  }

  polybezier(count, array) {
    if (!this.currentPage) return;
    this._beginStroke();
    const ops = [];
    let i = 0;
    const x0 = array[i++]*this.ratio_h, y0 = this._pdfY(array[i++]);
    ops.push(this.PDFLib.moveTo(x0, y0));
    let px = x0, py = y0;
    while (i < count * 6) {
      const x1=array[i++]*this.ratio_h, y1=this._pdfY(array[i++]);
      const x2=array[i++]*this.ratio_h, y2=this._pdfY(array[i++]);
      const x3=array[i++]*this.ratio_h, y3=this._pdfY(array[i++]);
      if (px===x1&&py===y1&&x2===x3&&y2===y3) ops.push(this.PDFLib.lineTo(x3,y3));
      else ops.push(this.PDFLib.curveTo(x1,y1,x2,y2,x3,y3));
      px=x3; py=y3;
    }
    ops.push(this.PDFLib.stroke());
    this.currentPage.pushOperators(...ops);
  }

  filledbezier(count, array) {
    if (!this.currentPage) return;
    this._beginFill();
    const ops = [];
    let i = 0;
    const x0=array[i++]*this.ratio_h, y0=this._pdfY(array[i++]);
    ops.push(this.PDFLib.moveTo(x0,y0));
    let px=x0, py=y0;
    while (i < count * 6) {
      const x1=array[i++]*this.ratio_h, y1=this._pdfY(array[i++]);
      const x2=array[i++]*this.ratio_h, y2=this._pdfY(array[i++]);
      const x3=array[i++]*this.ratio_h, y3=this._pdfY(array[i++]);
      if (px===x1&&py===y1&&x2===x3&&y2===y3) ops.push(this.PDFLib.lineTo(x3,y3));
      else ops.push(this.PDFLib.curveTo(x1,y1,x2,y2,x3,y3));
      px=x3; py=y3;
    }
    ops.push(this.PDFLib.closePath(), this.PDFLib.fill());
    this.currentPage.pushOperators(...ops);
  }

  setfont(name='', charclass=0x60c6, attr=0) {
    this.fontattr = attr;
    this.fontclass = charclass;
    // Select CID font based on vertical flag
    const vertical = !!(attr & 0x4000);
    // Use Gothic for sans-serif class (class bit 14 set = gothic)
    const isGothic = !!(charclass & 0x4000);
    if (isGothic)
      this._currentCIDFont = vertical ? this._cidFontGoV : this._cidFontGoH;
    else
      this._currentCIDFont = vertical ? this._cidFontV : this._cidFontH;
  }

  text(x, y, width, height, code) {
    if (!this.currentPage || height === 0) return;
    const s = (code >> 16) & 0xffff;
    const h = (code >> 8) & 0xff;
    const l = code & 0xff;
    if (s !== 0x21 || h < 0x21 || h > 0x7e || l < 0x21 || l > 0x7e) return;

    // Convert EUC-JP to Unicode codepoint
    const ucs2 = eucToUnicode(h | 0x80, l | 0x80);
    if (!ucs2) return;

    const vertical = !!(this.fontattr & 0x4000);
    const cidFont = this._currentCIDFont || (vertical ? this._cidFontV : this._cidFontH);

    // Ensure this font is registered in page resources
    this._ensurePageFont(cidFont);

    const fontSize = height * this.ratio_v;
    if (fontSize < 0.5) return;

    let px = x * this.ratio_h;
    let py = this._pdfY(y) - fontSize;

    // Vertical text offset
    if (vertical) {
      px += (width * this.ratio_h) / 2;
      py = this._pdfY(y - height);
    }

    // Emit raw PDF text operators using CID font
    const r = this.currentColor[0];
    const g = this.currentColor[1];
    const b = this.currentColor[2];

    // Build PDF string: Unicode codepoint as hex (for UniJIS-UCS2-H)
    const hexStr = ucs2.toString(16).padStart(4, '0');

    // Scale for non-square aspect
    const scaleX = (width / height) * (this.ratio_h / this.ratio_v);

    const stream = [
      `q`,
      `${r.toFixed(4)} ${g.toFixed(4)} ${b.toFixed(4)} rg`,
      `BT`,
      `/${cidFont.fontKey} ${fontSize.toFixed(2)} Tf`,
      `${scaleX.toFixed(4)} 0 0 1 ${px.toFixed(2)} ${py.toFixed(2)} Tm`,
      `<${hexStr}> Tj`,
      `ET`,
      `Q`,
    ].join('\n');

    this.currentPage.pushOperators(
      this.PDFLib.PDFOperator.of(stream)
    );
  }

  textwidth(width, height, code) {
    if ((this.fontattr & 0x8000) === 0) return width;
    const s=(code>>16)&0xffff, h=(code>>8)&0xff, l=code&0xff;
    if (s !== 0x21) return width;
    // Check if half-width via EUC-JP → SJIS
    const ucs2 = eucToUnicode(h|0x80, l|0x80);
    if (!ucs2) return width;
    // Half-width: U+0020..U+007E (ASCII) or half-width kana U+FF61..U+FF9F
    if (ucs2 < 0x0100 || (ucs2 >= 0xFF61 && ucs2 <= 0xFF9F)) return width / 2;
    return width;
  }

  // Draw a Unicode string clipped to a box (used for vobj titles)
  // l,t,r,b are already in TAD coordinates; fontsize_px is in TAD units
  text_unicode(str, l, t, r, b, fontsize_px) {
    if (!this.currentPage || !str) return;
    const cidFont = this._cidFontH;
    this._ensurePageFont(cidFont);
    const fontSize = Math.max(fontsize_px * this.ratio_v, 4);
    // Convert TAD coords to PDF coords
    const pl = l * this.ratio_h;
    const pr = r * this.ratio_h;
    const pt = this._pdfY(t);   // top in PDF = lower Y value
    const pb = this._pdfY(b);   // bottom in PDF = higher Y value
    // Text baseline: just below top of box
    const px = pl;
    const py = Math.max(pt, pb) - fontSize;
    const rc = this.currentColor[0];
    const gc = this.currentColor[1];
    const bc = this.currentColor[2];
    let hexStr = '';
    for (const ch of str) {
      const cp = ch.codePointAt(0);
      if (cp === undefined) continue;
      hexStr += cp.toString(16).padStart(4, '0');
    }
    if (!hexStr) return;
    const boxL = pl.toFixed(2), boxB = Math.min(pt,pb).toFixed(2);
    const boxW = Math.abs(pr - pl).toFixed(2), boxH = Math.abs(pt - pb).toFixed(2);
    const stream = [
      `q`,
      // Clip to vobj box
      `${boxL} ${boxB} ${boxW} ${boxH} re W n`,
      `${rc.toFixed(4)} ${gc.toFixed(4)} ${bc.toFixed(4)} rg`,
      `BT`,
      `/${cidFont.fontKey} ${fontSize.toFixed(2)} Tf`,
      `1 0 0 1 ${px.toFixed(2)} ${py.toFixed(2)} Tm`,
      `<${hexStr}> Tj`,
      `ET`,
      `Q`,
    ].join('\n');
    this.currentPage.pushOperators(this.PDFLib.PDFOperator.of(stream));
  }

  async bitmap(bitmaparray, view_rect, draw_rect) {
    if (!this.currentPage || !bitmaparray) {
      console.log('[IMG] bitmap skip: currentPage=', !!this.currentPage, 'bitmaparray=', !!bitmaparray);
      return;
    }
    const { rgba, width, height } = bitmaparray;
    console.log('[IMG] bitmap called: size=', width, 'x', height,
      'view_rect=', view_rect, 'draw_rect=', draw_rect,
      'rgba bytes=', rgba ? rgba.length : 0);

    // Convert RGBA to PNG via OffscreenCanvas or ImageData
    let pngBytes;
    try {
      // OffscreenCanvas (Chrome, Firefox, Edge)
      const oc = new OffscreenCanvas(width, height);
      const ctx2d = oc.getContext('2d');
      const id = new ImageData(rgba, width, height);
      ctx2d.putImageData(id, 0, 0);
      const blob = await oc.convertToBlob({ type: 'image/png' });
      const ab = await blob.arrayBuffer();
      pngBytes = new Uint8Array(ab);
      console.log('[IMG] OffscreenCanvas PNG ok:', pngBytes.length, 'bytes');
    } catch(e) {
      console.log('[IMG] OffscreenCanvas failed, using encodePng fallback:', e.message);
      pngBytes = encodePng(rgba, width, height);
      console.log('[IMG] encodePng:', pngBytes ? pngBytes.length : 0, 'bytes');
    }

    try {
      const img = await this.pdfDoc.embedPng(pngBytes);
      const vl = Math.min(view_rect[0], view_rect[2]) * this.ratio_h;
      const vb = Math.min(this._pdfY(view_rect[1]), this._pdfY(view_rect[3]));
      const w = Math.abs(view_rect[2] - view_rect[0]) * this.ratio_h;
      const h = Math.abs(this._pdfY(view_rect[1]) - this._pdfY(view_rect[3]));
      (window.__dbgLog||console.log)('[IMG] embedPng ok, placing: x=', vl.toFixed(1), 'y=', vb.toFixed(1),
        'w=', w.toFixed(1), 'h=', h.toFixed(1));
      if (w > 0 && h > 0) {
        // Low-level XObject: avoids drawImage conflict with pushOperators-based content
        const imgName = 'Img' + (this._imgCount = (this._imgCount||0)+1);
        const pageNode = this.currentPage.node;
        const PDFName = this.PDFLib.PDFName;
        let res = pageNode.get(PDFName.of('Resources'));
        if (!res) {
          pageNode.set(PDFName.of('Resources'), this.pdfDoc.context.obj({}));
          res = pageNode.get(PDFName.of('Resources'));
        }
        let xobj = res.get(PDFName.of('XObject'));
        if (!xobj) {
          res.set(PDFName.of('XObject'), this.pdfDoc.context.obj({}));
          xobj = res.get(PDFName.of('XObject'));
        }
        xobj.set(PDFName.of(imgName), img.ref);
        const ops = `q ${w.toFixed(4)} 0 0 ${h.toFixed(4)} ${vl.toFixed(4)} ${vb.toFixed(4)} cm /${imgName} Do Q`;
        this.currentPage.pushOperators(this.PDFLib.PDFOperator.of(ops));
        (window.__dbgLog||console.log)('[IMG] placed:', imgName, ops);
      } else {
        (window.__dbgLog||console.warn)('[IMG] skipped: w or h = 0');
      }
    } catch(e) { (window.__dbgLog||console.warn)('[IMG] embed/place error:', e && (e.message||e.toString())); }
  }

  getjumpto() { return this.pagecountobj; }

  setjumpto(l, t, r, b, jumpto) {
    if (jumpto === null || jumpto === undefined) return;
    this.jumptolist.push([l, t, r, b, jumpto.pagecount]);
  }
}

// ============================================================
// EUC-JP → SJIS conversion (for CID font encoding)
// ============================================================

// BPACK filename bytes (EUC-JP) → JS string
function bpackNameToString(eucBytes) {
  try {
    return new TextDecoder('euc-jp').decode(new Uint8Array(eucBytes));
  } catch(e) {
    return String.fromCharCode(...eucBytes);
  }
}

function eucToUnicode(eucH, eucL) {
  try {
    const bytes = new Uint8Array([eucH, eucL]);
    const str = new TextDecoder('euc-jp').decode(bytes);
    const cp = str.codePointAt(0);
    if (cp === undefined || cp === 0xFFFD) return null;
    return cp;
  } catch(e) {
    return null;
  }
}

// ============================================================
// Minimal PNG encoder (fallback when OffscreenCanvas unavailable)
// ============================================================

function encodePng(rgba, width, height) {
  const sig = new Uint8Array([137,80,78,71,13,10,26,10]);
  function u32be(n) { return [(n>>>24)&0xff,(n>>>16)&0xff,(n>>>8)&0xff,n&0xff]; }
  function crc32(data) {
    let c=0xffffffff;
    if (!crc32._t) {
      crc32._t=new Uint32Array(256);
      for(let i=0;i<256;i++){let v=i;for(let j=0;j<8;j++)v=v&1?(0xedb88320^(v>>>1)):(v>>>1);crc32._t[i]=v;}
    }
    for(const b of data)c=crc32._t[(c^b)&0xff]^(c>>>8);
    return(c^0xffffffff)>>>0;
  }
  function chunk(type,data){
    const tb=type.split('').map(c=>c.charCodeAt(0));
    const len=u32be(data.length);
    const body=[...tb,...data];
    return [...len,...body,...u32be(crc32(body))];
  }
  const ihdr=chunk('IHDR',[...u32be(width),...u32be(height),8,6,0,0,0]);
  const raw=[];
  for(let y=0;y<height;y++){
    raw.push(0);
    for(let x=0;x<width;x++){const i=(y*width+x)*4;raw.push(rgba[i],rgba[i+1],rgba[i+2],rgba[i+3]);}
  }
  // zlib uncompressed
  let s1=1,s2=0;
  for(const b of raw){s1=(s1+b)%65521;s2=(s2+s1)%65521;}
  const defl=[0x78,0x01];
  const BS=65535;
  for(let off=0;off<raw.length;off+=BS){
    const bl=raw.slice(off,off+BS);
    const last=(off+BS>=raw.length)?1:0;
    defl.push(last,bl.length&0xff,(bl.length>>8)&0xff,(~bl.length)&0xff,((~bl.length)>>8)&0xff,...bl);
  }
  defl.push((s2>>8)&0xff,s2&0xff,(s1>>8)&0xff,s1&0xff);
  const idat=chunk('IDAT',defl);
  const iend=chunk('IEND',[]);
  return new Uint8Array([...sig,...ihdr,...idat,...iend]);
}

// ============================================================
// Global state (replaces PHP globals)
// ============================================================

let g_overlayscopelist = [];
let g_overlayattrlist = [];
let g_figurepage = 2;
let g_tcmapdb = new TcmapNodatabase();

// ============================================================
// Main conversion function
// ============================================================

async function convertBpackToPdf(uint8array, pdfLib, options = {}) {
  g_overlayscopelist = [];
  g_overlayattrlist = [];
  g_figurepage = options.figurepage !== undefined ? options.figurepage : 2;

  const fs = new FileBytestream(uint8array);

  // Find BPACK block
  let found = false;
  for (;;) {
    if (!fs.remain()) throw new Error('BPACK block not found in file.');
    const type = fs.uh();
    if (type < 0xff00) continue;
    let size = fs.uh();
    if (size === 0xffff) size = fs.uw();
    const next = fs.offset() + size;

    if (type === 0xffe7 && size >= 0x42) {
      fs.offset(24, 1);
      if (fs.uh() === 0x8000 && fs.uh() === 0xc003 && fs.uh() === 0x8000) {
        fs.offset(32, 1);
        found = true;
        break;
      }
    }
    fs.offset(next, 0);
  }

  if (!found) throw new Error('No valid BPACK segment found.');

  const len = fs.uw();
  const gh = new BpGhead(fs);
  gh.checkhead();

  let ls;
  if (gh.compmethod === 0) ls = fs;
  else ls = new LzssStream(fs);

  const nextpos = ls.offset() + gh.extsize;
  if (ls.uh() !== 1) throw new Error('extbuf error');
  ls.offset(nextpos, 0);

  // Read file info
  const fileinfo = [];
  for (let i = 0; i < gh.nfiles; i++) {
    const lh = new BpLhead(ls);
    const fi = new FileInfo();
    fi.lh = lh; fi.name = lh.name; fi.mtime = lh.mtime;
    fileinfo.push(fi);
  }

  // Parse TAD records
  for (let i = 0; i < gh.nfiles; i++) {
    const lh = fileinfo[i].lh;
    const robj = new MemoryBytestream();
    for (let j = 0; j < lh.nrec; j++) {
      const hdr = new BpRhead(ls);
      switch (hdr.type) {
        case 0: { // link
          if (hdr.size !== 52) { ls.offset(hdr.size, 1); break; }
          ls.offset(40, 1);
          const li = new LinkInfo();
          li.fileinfo = fileinfo[ls.uh()];
          li.attr = ls.uh();
          robj.appendlinkinfo(li);
          ls.offset(8, 1);
          break;
        }
        case 1: { // TAD
          robj.append_from_stream(ls, hdr.size & 0x7ffffffe);
          if (hdr.size & 1) ls.ub();
          break;
        }
        default:
          ls.offset(hdr.size, 1);
      }
    }
    const basescope = new BaseScopeParts();
    basescope.factoryfinder.readall(robj);
    fileinfo[i].basescope = basescope;
  }

  // Create genv and render
  const genv = new GenvPdf(pdfLib);
  await genv.init();

  // Pre-pass: measure pages (genv2 equivalent)
  const genvNull = new GenvNull();
  for (let i = 0; i < gh.nfiles; i++) {
    const basescope = fileinfo[i].basescope;
    basescope.partslist.rewind();
    const target = basescope.partslist.get();
    if (!target) continue;
    fileinfo[i].jumpto = genv.getjumpto();
    genv.setdpi(target.pageattrlist.get('dpih'), target.pageattrlist.get('dpiv'));
    const pos = [0,0,0,0];
    await basescope.draw_root(genvNull);
  }

  // Reset page counter and draw
  genv.pagecountobj = new PageCount();
  for (let i = 0; i < gh.nfiles; i++) {
    const basescope = fileinfo[i].basescope;
    basescope.partslist.rewind();
    const target = basescope.partslist.get();
    if (!target) continue;
    genv.setdpi(target.pageattrlist.get('dpih'), target.pageattrlist.get('dpiv'));
    await basescope.draw_root(genv);
    genv.flushpage();
  }

  genv.close();
  return await genv.getBytes();
}

// ============================================================
// Browser entry point
// ============================================================

if (typeof window !== 'undefined') {
  window.TadViewBP = { convertBpackToPdf };
}

</script>
<script>
(function() {
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const convertBtn = document.getElementById('convertBtn');
  const statusEl = document.getElementById('status');
  const progressEl = document.getElementById('progress');
  const progressBar = document.getElementById('progressBar');
  const fileInfoEl = document.getElementById('fileInfo');
  const fileNameEl = document.getElementById('fileName');
  const fileSizeEl = document.getElementById('fileSize');
  let selectedFile = null;

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1024/1024).toFixed(1) + ' MB';
  }

  function setFile(file) {
    selectedFile = file;
    fileNameEl.textContent = file.name;
    fileSizeEl.textContent = formatSize(file.size);
    fileInfoEl.style.display = 'flex';
    convertBtn.disabled = false;
    setStatus('');
  }

  function setStatus(msg, type='') {
    statusEl.className = 'status' + (type ? ' '+type : '');
    statusEl.textContent = msg;
  }

  function setProgress(pct) {
    progressEl.style.display = 'block';
    progressBar.style.width = pct + '%';
    if (pct >= 100) setTimeout(() => { progressEl.style.display='none'; progressBar.style.width='0%'; }, 600);
  }

  // Drag & drop
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) setFile(f);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

  convertBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    if (typeof PDFLib === 'undefined') {
      setStatus('pdf-lib の読み込みに失敗しました。ネットワーク接続を確認してください。', 'error');
      return;
    }
    if (typeof TadViewBP === 'undefined') {
      setStatus('変換エンジンの読み込みに失敗しました。', 'error');
      return;
    }

    convertBtn.disabled = true;
    setStatus('変換中...', 'info');
    setProgress(10);

    try {
      const figurepage = parseInt(document.querySelector('input[name=figurepage]:checked').value);
      const buffer = await selectedFile.arrayBuffer();
      const uint8 = new Uint8Array(buffer);
      setProgress(30);

      const pdfBytes = await TadViewBP.convertBpackToPdf(uint8, PDFLib, { figurepage });
      setProgress(90);

      // Download
      const blob = new Blob([pdfBytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = selectedFile.name.replace(/\.[^.]+$/, '') + '.pdf';
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);

      setProgress(100);
      setStatus('✓ 変換完了。PDFをダウンロードしました。', 'success');
    } catch (e) {
      setProgress(0);
      progressEl.style.display = 'none';
      setStatus('エラー: ' + e.message, 'error');
      console.error(e);
    } finally {
      convertBtn.disabled = false;
    }
  });
})();
</script>
